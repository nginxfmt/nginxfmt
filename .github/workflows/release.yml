name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install LLVM (cargo-xwin)
        run: sudo apt-get update && sudo apt-get install -y clang llvm lld

      - name: Install Chocolatey
        env:
          CHOCO_VERSION: "2.7.2"
        run: |
          sudo apt-get install -y mono-devel
          CHOCO_DIR=/opt/chocolatey
          CHOCO_URL="https://github.com/chocolatey/choco/releases/download/${CHOCO_VERSION}/chocolatey.v${CHOCO_VERSION}.tar.gz"
          sudo mkdir -p "$CHOCO_DIR"
          curl -fsSL "$CHOCO_URL" -o /tmp/choco.tar.gz
          sudo tar -xzf /tmp/choco.tar.gz -C "$CHOCO_DIR"
          printf '#!/usr/bin/env bash\nexec mono %q "$@"\n' "$CHOCO_DIR/choco.exe" | sudo tee /usr/local/bin/choco >/dev/null
          sudo chmod +x /usr/local/bin/choco
          choco --version

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          AUR_PRIVATE_KEY: ${{ secrets.AUR_PRIVATE_KEY }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      - name: Publish to crates.io
        run: cargo publish --locked --quiet --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
