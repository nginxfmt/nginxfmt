snapcrafts:
  - name: nginxfmt
    summary: Format nginx configuration files
    description: |
      nginxfmt is a fast, lean command-line tool that formats nginx
      configuration files with configurable indentation and brace style.
    grade: stable
    confinement: classic
    license: GPL-3.0-or-later
    publish: false
    apps:
      nginxfmt:
        command: nginxfmt
